<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grimório D&D</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #121212;
    color: #eee;
}

.container {
    display: flex;
    height: 100vh;
}

/* ESQUERDA */
.left {
    width: 60%;
    padding: 25px;
    overflow-y: auto;
    border-right: 1px solid #2a2a2a;
    background: #181818;
}

.left h1 {
    margin: 0 0 5px;
    font-size: 28px;
}

#subinfo {
    color: #aaa;
    margin-bottom: 15px;
}

#desc {
    white-space: pre-wrap;
    line-height: 1.6;
    background: #1f1f1f;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #333;
}

/* DIREITA */
.right {
    width: 40%;
    padding: 20px;
    overflow-y: auto;
    background: #151515;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    background: #1f1f1f;
    color: white;
    border: 1px solid #333;
    border-radius: 6px;
}

/* LISTA */
.spell {
    padding: 14px;
    border-radius: 8px;
    margin-bottom: 6px;
    cursor: pointer;
    background: #1b1b1b;
    transition: 0.2s;
}

.spell:hover {
    background: #252525;
}

/* BADGE CÍRCULO */
.circle {
    float: right;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: bold;
}

/* CORES */
.c0 { background: #2e7d32; }
.c1 { background: #558b2f; }
.c2 { background: #f9a825; color: #000; }
.c3 { background: #ef6c00; }
.c4 { background: #c62828; }
.c5 { background: #ad1457; }
.c6 { background: #6a1b9a; }
.c7 { background: #4527a0; }
.c8 { background: #283593; }
.c9 { background: #1a237e; }

/* SCROLL */
::-webkit-scrollbar {
    width: 8px;
}
::-webkit-scrollbar-thumb {
    background: #333;
}

/* MOBILE */
@media (max-width: 768px) {
    .container {
        flex-direction: column;
    }

    .left, .right {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- ESQUERDA -->
    <div class="left">
        <h1 id="name">Selecione uma magia</h1>
        <p id="subinfo"></p>
        <pre id="desc"></pre>
    </div>

    <!-- DIREITA -->
    <div class="right">

        <input type="text" id="search" placeholder="Buscar magia...">

        <select id="classFilter">
            <option value="">Todas Classes</option>
        </select>

        <select id="circleFilter">
            <option value="">Todos Círculos</option>
        </select>

        <div id="list"></div>

    </div>

</div>

function populateFilters() {
    const classSelect = document.getElementById("classFilter");
    CLASSES.forEach(c => {
        let opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c;
        classSelect.appendChild(opt);
    });

    const circleSelect = document.getElementById("circleFilter");
    CIRCULOS.forEach(c => {
        let opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c === "0" ? "Truque" : `${c}º`;
        circleSelect.appendChild(opt);
    });
}

function getCircleClass(c) {
    return "c" + c;
}

function showSpell(spell) {
    document.getElementById("name").textContent = spell.nome;

    document.getElementById("subinfo").textContent =
        `Círculo ${spell.circulo} • ${spell.classes.join(", ")}`;

    document.getElementById("desc").textContent = spell.descricao;
}

function renderList() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    const search = document.getElementById("search").value.toLowerCase();
    const selectedClass = document.getElementById("classFilter").value;
    const selectedCircle = document.getElementById("circleFilter").value;

    spells
    .filter(s =>
        s.nome.toLowerCase().includes(search) &&
        (!selectedClass || s.classes.includes(selectedClass)) &&
        (!selectedCircle || s.circulo == selectedCircle)
    )
    .forEach(spell => {
        let div = document.createElement("div");
        div.className = "spell";

        div.innerHTML = `
            <strong>${spell.nome}</strong>
            <span class="circle ${getCircleClass(spell.circulo)}">
                ${spell.circulo == 0 ? "Truque" : spell.circulo}
            </span>
        `;

        div.onclick = () => showSpell(spell);

        list.appendChild(div);
    });
}

document.getElementById("search").addEventListener("input", renderList);
document.getElementById("classFilter").addEventListener("change", renderList);
document.getElementById("circleFilter").addEventListener("change", renderList);

populateFilters();
renderList();

</script>

</body>
</html>
